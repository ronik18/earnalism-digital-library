name: Regression suite

on:
  pull_request:
  push:
    branches:
      - main
      - production-deploy
  workflow_dispatch:

concurrency:
  group: regression-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: backend + frontend + browser regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FRONTEND_API_URL: ${{ vars.API_URL || 'https://api.theearnalism.com' }}
      PLAYWRIGHT_PREFIX: /tmp/earnalism-playwright
      RUN_E2E: "1"
      RUN_LOAD: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend regression dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pytest requests python-dotenv \
            fastapi==0.110.1 starlette==0.37.2 \
            pydantic==2.12.5 email-validator \
            motor==3.3.1 pymongo==4.5.0 \
            bcrypt==4.1.3 PyJWT==2.12.1 python-jose==3.5.0 python-multipart==0.0.9 \
            bleach==6.1.0 markdown==3.6 mammoth==1.7.1 Pillow==10.3.0 cloudinary==1.40.0 \
            httpx==0.28.1

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --legacy-peer-deps

      - name: Install Playwright Chromium
        run: |
          npm install --prefix "${PLAYWRIGHT_PREFIX}" playwright@1.60.0
          "${PLAYWRIGHT_PREFIX}/node_modules/.bin/playwright" install --with-deps chromium

      - name: Run regression suite
        run: bash scripts/run_regression_suite.sh
