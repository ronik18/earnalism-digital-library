name: Post-deploy k6 smoke test

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: post-deploy-k6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6-smoke:
    name: k6 production smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FRONTEND_URL: ${{ vars.FRONTEND_URL || 'https://theearnalism.com' }}
      API_URL: ${{ vars.API_URL || 'https://api.theearnalism.com' }}
      POST_DEPLOY_WAIT_SECONDS: ${{ vars.POST_DEPLOY_WAIT_SECONDS || '90' }}
      K6_HTTP_P95_THRESHOLD: ${{ vars.K6_HTTP_P95_THRESHOLD || 'p(95)<5000' }}
      K6_LOAD_VUS: ${{ vars.K6_LOAD_VUS || '100' }}
      K6_LOAD_DURATION: ${{ vars.K6_LOAD_DURATION || '2m' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for production deployment
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting ${POST_DEPLOY_WAIT_SECONDS}s for Vercel/Railway deployment propagation..."
          sleep "${POST_DEPLOY_WAIT_SECONDS}"

          for attempt in {1..30}; do
            frontend_status="$(curl -L -s -o /dev/null -w "%{http_code}" "${FRONTEND_URL}")"
            backend_status="$(curl -L -s -o /dev/null -w "%{http_code}" "${API_URL}/health")"
            home_status="$(curl -L -s -o /dev/null -w "%{http_code}" "${API_URL}/api/home")"
            echo "Attempt ${attempt}: frontend=${frontend_status} backend=${backend_status} home=${home_status}"
            if [[ "${frontend_status}" == "200" && "${backend_status}" == "200" && "${home_status}" == "200" ]]; then
              exit 0
            fi
            sleep 10
          done

          echo "Production URLs did not become healthy before k6 smoke test."
          exit 1

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 smoke test
        run: k6 run scripts/k6_smoke.js

      - name: Run 100-user k6 load test
        run: k6 run scripts/k6_load_100.js
