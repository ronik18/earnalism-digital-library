server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location /api/ {
        return 308 https://api.theearnalism.com$request_uri;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
        try_files $uri =404;
    }

    location = /site.webmanifest {
        add_header Cache-Control "public, max-age=3600, s-maxage=86400";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /book/moby-dick-or-the-whale {
        return 302 /library;
    }

    location = /book/moby-dick-or-the-whale/ {
        return 302 /library;
    }

    location = /reader/moby-dick-or-the-whale {
        return 302 /library;
    }

    location = /reader/moby-dick-or-the-whale/ {
        return 302 /library;
    }

    location = /book/the-count-of-monte-cristo {
        return 302 /library;
    }

    location = /book/the-count-of-monte-cristo/ {
        return 302 /library;
    }

    location = /reader/the-count-of-monte-cristo {
        return 302 /library;
    }

    location = /reader/the-count-of-monte-cristo/ {
        return 302 /library;
    }

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
